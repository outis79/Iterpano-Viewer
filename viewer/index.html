<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iterpano Viewer</title>
  <link rel="stylesheet" href="vendor/reset.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="viewer-header">
    <div class="title">Iterpano Viewer</div>
    <div class="actions">
      <button class="btn ghost mobile-only" id="btn-mobile-groups">Group</button>
      <button class="btn ghost mobile-only" id="btn-mobile-scenes">Scenes</button>
      <button class="btn ghost mobile-only" id="btn-mobile-map">Map</button>
      <button class="btn ghost" id="btn-home-toggle">Home</button>
      <button class="btn ghost" id="btn-fullscreen">Fullscreen 360</button>
      <button class="btn ghost" id="btn-gyro">Enable Gyro</button>
      <button class="btn ghost" id="btn-reset-orientation">Reset Orientation</button>
      <button class="btn ghost" id="btn-vr">Enter VR</button>
    </div>
  </header>

  <main class="viewer-shell">
    <div class="pano">
      <button class="btn ghost fullscreen-exit hidden" id="btn-fullscreen-exit" aria-label="Exit fullscreen">Exit</button>
      <div id="pano" class="pano-single">
      </div>
      <div id="scene-link-tooltip" class="scene-link-tooltip hidden" aria-hidden="true"></div>
      <div id="pano-vr" class="pano-vr">
        <div class="pano-pane" id="pano-left"></div>
        <div class="pano-pane" id="pano-right"></div>
      </div>
      <div id="home-page-overlay" class="home-page-overlay hidden" aria-hidden="true">
        <div id="home-page-frame" class="home-page-frame">
          <div class="home-page-header">
            <button class="btn" id="btn-home-page-start">Start Tour</button>
          </div>
          <div id="home-page-body" class="modal-body home-page-body"></div>
        </div>
      </div>
    </div>

    <aside class="side-panel">
      <div class="mobile-panel-head">
        <div class="mobile-panel-title" id="mobile-panel-title">Scenes</div>
        <button class="btn ghost mobile-panel-close" id="btn-mobile-panel-close" aria-label="Close panel">Close</button>
      </div>
      <div class="panel-section group-select-section">
        <div class="section-title">Groups</div>
        <select id="group-select" class="field-select" aria-label="Scene groups"></select>
      </div>

      <div class="panel-section mobile-group-list-section">
        <div class="section-title">Groups</div>
        <div class="scene-list" id="group-list-mobile"></div>
      </div>

      <div class="panel-section scene-list-section">
        <div class="section-title">Scenes</div>
        <div class="scene-list" id="scene-list"></div>
      </div>

      <div class="panel-section floorplan-panel" id="floorplan-panel">
        <div class="section-title">Map</div>
        <div class="floorplan-tools">
          <button class="btn ghost" id="btn-floorplan-zoom-out">-</button>
          <button class="btn ghost" id="btn-floorplan-zoom-in">+</button>
          <button class="btn ghost" id="btn-floorplan-zoom-reset">Reset</button>
          <button class="btn ghost mobile-only" id="btn-floorplan-mobile-close">Close</button>
          <button class="btn ghost" id="btn-floorplan-expand">Maximise</button>
          <span class="floorplan-zoom-value" id="floorplan-zoom-value">100%</span>
        </div>
        <div class="floorplan-wrap">
          <div id="floorplan-stage" class="floorplan-stage hidden">
            <img id="floorplan-image" class="floorplan-image hidden" alt="Floorplan">
            <div id="floorplan-markers" class="floorplan-markers hidden" aria-label="Floorplan scene markers"></div>
          </div>
          <div id="floorplan-empty" class="muted-note hidden"></div>
        </div>
      </div>
    </aside>
  </main>

  <div class="mobile-panel-backdrop hidden" id="mobile-panel-backdrop" aria-hidden="true"></div>
  <div class="orientation-lock-overlay hidden" id="orientation-lock-overlay" aria-hidden="true">
    <div class="orientation-lock-card">
      <div class="orientation-lock-title">Landscape Required</div>
      <div class="orientation-lock-text">Rotate your device to landscape to view the tour.</div>
    </div>
  </div>

  <footer class="license-footer">
    Powered by Marzipano (Apache-2.0), JSZip (MIT), Bowser (MIT), Screenfull (MIT), Reset CSS (Public Domain).
  </footer>

  <div class="hotspot-modal" id="hotspot-modal" aria-hidden="true">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="btn ghost modal-close-x" id="btn-close-modal" aria-label="Close popup">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="vendor/screenfull.min.js"></script>
  <script src="vendor/bowser.min.js"></script>
  <script src="vendor/marzipano.js"></script>
  <script src="runtime-ui.js"></script>
  <script src="runtime-gyro.js"></script>
  <script src="runtime-floorplan.js"></script>
  <script src="runtime-mobile-panels.js"></script>
  <script src="runtime-hotspots.js"></script>
  <script src="app.js"></script>
<!-- Code injected by live-server -->

</body>
</html>
